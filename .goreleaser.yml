version: 2

project_name: jw

before:
  hooks:
    - go test ./...

builds:
  - id: jw
    main: ./cmd/jw
    binary: jw
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: jw
    ids:
      - jw
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: git

release:
  github:
    owner: tc6-01
    name: jw

brews:
  - name: jw
    ids:
      - jw
    repository:
      owner: tc6-01
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/tc6-01/jw
    description: Terminal web jump tool (zoxide-like for URLs)
    license: MIT
    test: |
      output = shell_output("#{bin}/jw version")
      assert_match version.to_s, output
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
    commit_msg_template: "chore: bump jw to {{ .Tag }}"
